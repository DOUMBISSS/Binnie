<!-- Google Translate Widget - Version fiable -->
<div id="google_translate_element" style="display: none;"></div>
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'fr',
      includedLanguages: 'fr,en',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
    }, 'google_translate_element');
  }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script type="text/javascript">
  // Force la traduction lors du changement de langue
  function changeLanguage(lang) {
    var selectBox = document.querySelector(".goog-te-combo");
    if (selectBox) {
      selectBox.value = lang;
      selectBox.dispatchEvent(new Event("change"));
    } else {
      // Si le sélecteur n'existe pas encore, on attend un peu
      setTimeout(function() { changeLanguage(lang); }, 500);
    }
  }

  
</script>
